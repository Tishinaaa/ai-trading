<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conclave — Семь агентов. Один вердикт.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   CONCLAVE — Editorial / Contrarian design system
   ============================================================ */

:root {
  --paper: #F1ECE0;
  --paper-2: #E8E2D2;
  --ink: #14130F;
  --ink-2: #2A2620;
  --ink-3: #6B6358;
  --ink-4: #A39B8C;
  --rule: #1A1814;
  --hair: rgba(20, 19, 15, 0.14);
  --orange: #E04E1B;
  --orange-2: #C43E10;
  --blue: #1B3A5C;
  --green: #2F6B3B;
  --red: #B0301E;

  --serif: 'Instrument Serif', 'GT Sectra', 'Times New Roman', Georgia, serif;
  --sans: 'Inter Tight', 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
}

[data-theme="ink"] {
  --paper: #14130F;
  --paper-2: #1C1A15;
  --ink: #F1ECE0;
  --ink-2: #D9D2C2;
  --ink-3: #8A8170;
  --ink-4: #5A5346;
  --rule: #F1ECE0;
  --hair: rgba(241, 236, 224, 0.16);
  --orange: #FF6B2C;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  background-image:
    radial-gradient(1200px 600px at 80% -20%, rgba(224, 78, 27, 0.05), transparent 60%),
    radial-gradient(900px 500px at -10% 30%, rgba(27, 58, 92, 0.04), transparent 60%);
  background-attachment: fixed;
}

::selection { background: var(--orange); color: var(--paper); }

/* ── Typography ───────────────────────────────────────────── */
.serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
.sans  { font-family: var(--sans); }
.mono  { font-family: var(--mono); font-variant-numeric: tabular-nums; }

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.eyebrow .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--orange);
  margin-right: 8px;
  vertical-align: 1.5px;
  animation: pulse 1.6s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.h1 {
  font-family: var(--serif);
  font-size: clamp(48px, 8.4vw, 132px);
  line-height: 0.94;
  letter-spacing: -0.035em;
  font-weight: 400;
  margin: 0;
}

.h1 em {
  font-style: italic;
  color: var(--orange);
}

.h2 {
  font-family: var(--serif);
  font-size: clamp(40px, 6vw, 88px);
  line-height: 0.96;
  letter-spacing: -0.025em;
  font-weight: 400;
  margin: 0;
}

.h3 {
  font-family: var(--serif);
  font-size: clamp(26px, 3vw, 40px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  font-weight: 400;
  margin: 0;
}

.lede {
  font-family: var(--serif);
  font-size: clamp(20px, 1.6vw, 26px);
  line-height: 1.35;
  color: var(--ink-2);
  font-weight: 400;
}

.body {
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-2);
}

.small {
  font-family: var(--sans);
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--ink-3);
}

/* ── Layout ───────────────────────────────────────────────── */
.page {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 40px;
}

@media (max-width: 720px) {
  .page { padding: 0 20px; }
}

.rule {
  height: 1px;
  background: var(--ink);
  opacity: 0.85;
  width: 100%;
}

.hairline {
  height: 1px;
  background: var(--hair);
  width: 100%;
}

/* ── Common ───────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
  transition: all 0.18s ease;
  border-radius: 0;
  text-decoration: none;
}

.btn:hover {
  background: var(--orange);
  border-color: var(--orange);
}

.btn-ghost {
  background: transparent;
  color: var(--ink);
}

.btn-ghost:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}

.btn .arrow {
  display: inline-block;
  transition: transform 0.18s ease;
}

.btn:hover .arrow { transform: translateX(3px); }

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid var(--hair);
  color: var(--ink-2);
  background: transparent;
}

.tag-orange { background: var(--orange); color: var(--paper); border-color: var(--orange); }
.tag-blue   { background: var(--blue); color: var(--paper); border-color: var(--blue); }
.tag-ink    { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* directional tag colors */
.dir-long  { color: var(--green); }
.dir-short { color: var(--red); }
.dir-skip  { color: var(--ink-3); }

/* ── Marquee ──────────────────────────────────────────────── */
.marquee {
  overflow: hidden;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.marquee:hover .marquee-track { animation-play-state: paused; }

.marquee-track {
  display: inline-flex;
  white-space: nowrap;
  animation: marquee 40s linear infinite;
}

.marquee-item {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 14px 28px;
  font-family: var(--mono);
  font-size: 12.5px;
  letter-spacing: 0.06em;
  border-right: 1px solid rgba(241, 236, 224, 0.15);
}

@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── Section spacing ──────────────────────────────────────── */
.section {
  padding: 96px 0;
}

@media (max-width: 720px) {
  .section { padding: 56px 0; }
}

/* ── Utility grids ────────────────────────────────────────── */
.grid { display: grid; gap: 24px; }
.col-12 { grid-template-columns: repeat(12, 1fr); }
.col-6  { grid-template-columns: repeat(6, 1fr); }
.col-4  { grid-template-columns: repeat(4, 1fr); }
.col-3  { grid-template-columns: repeat(3, 1fr); }
.col-2  { grid-template-columns: repeat(2, 1fr); }

@media (max-width: 900px) {
  .col-12, .col-6, .col-4, .col-3 { grid-template-columns: 1fr; }
  .col-2 { grid-template-columns: 1fr; }
}

/* ── Reveal on scroll ─────────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.7s cubic-bezier(.2,.7,.2,1), transform 0.7s cubic-bezier(.2,.7,.2,1);
  will-change: opacity, transform;
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

/* ============================================================
   CONCLAVE — section-specific styles
   ============================================================ */

/* ── Masthead ─────────────────────────────────────────────── */
.masthead {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(241, 236, 224, 0.86);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--ink);
}
.masthead-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 14px 40px;
  gap: 24px;
}
.masthead-left { color: var(--ink-3); display: flex; gap: 10px; }
.masthead-left .dim { opacity: 0.45; }
.masthead-logo {
  font-size: 28px;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-decoration: none;
  font-weight: 400;
  text-align: center;
}
.logo-dot { color: var(--orange); }
.masthead-right { display: flex; align-items: center; gap: 24px; justify-content: flex-end; }
.masthead-nav { display: flex; gap: 22px; }
.masthead-nav a {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-2);
  text-decoration: none;
  transition: color 0.15s;
}
.masthead-nav a:hover { color: var(--orange); }
.lang-switch { display: flex; gap: 6px; align-items: center; font-size: 12px; }
.lang-switch button {
  background: none; border: 0; padding: 0; cursor: pointer;
  font: inherit; color: var(--ink-3); letter-spacing: 0.1em;
}
.lang-switch button.on { color: var(--ink); font-weight: 600; }
.lang-switch span { color: var(--ink-4); }
@media (max-width: 900px) {
  .masthead-row { grid-template-columns: auto 1fr auto; padding: 12px 20px; }
  .masthead-nav { display: none; }
  .masthead-left { display: none; }
}

/* ── Hero ─────────────────────────────────────────────────── */
.hero { position: relative; padding: 80px 0 0; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.7; pointer-events: none; }
.hero-bg-grid {
  background-image:
    linear-gradient(var(--hair) 1px, transparent 1px),
    linear-gradient(90deg, var(--hair) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
}
.hero-inner { position: relative; padding-top: 40px; }
.hero-eyebrow { margin-bottom: 32px; }
.hero-h1 { max-width: 22ch; }
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 80px;
  margin-top: 64px;
  align-items: end;
}
@media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
.hero-lede { max-width: 56ch; }
.hero-cta { display: flex; gap: 14px; margin-top: 32px; flex-wrap: wrap; }

/* Hero colophon (newspaper masthead-style meta) */
.hero-meta {
  border-top: 1px solid var(--ink);
  padding: 18px 0 6px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.hm-eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--ink-3);
  text-align: center;
}
.hm-list { margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.hm-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 16px;
  padding: 8px 0;
  border-bottom: 1px dotted var(--hair);
}
.hm-row:last-child { border-bottom: 0; }
.hm-row dt {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin: 0;
}
.hm-row dd {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--ink);
  margin: 0;
}

.hero-stats {
  position: relative;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  margin-top: 96px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.hero-stats > .stat:not(:last-child) { border-right: 1px solid var(--hair); }
.stat { padding: 26px 28px; min-height: 130px; display: flex; flex-direction: column; gap: 8px; }
.stat-num { font-size: clamp(40px, 4.4vw, 64px); line-height: 1; letter-spacing: -0.03em; color: var(--ink); }
.stat-unit { font-size: 0.55em; color: var(--ink-3); margin-left: 2px; }
.stat-lbl { color: var(--ink-3); }
.spark { margin-top: auto; }
@media (max-width: 900px) {
  .hero-stats { grid-template-columns: repeat(2, 1fr); }
  .hero-stats > .stat { border-right: 1px solid var(--hair) !important; border-bottom: 1px solid var(--hair); }
  .hero-stats > .stat:nth-child(even) { border-right: 0 !important; }
}

/* ── Marquee colors ───────────────────────────────────────── */
.m-pair { font-weight: 600; }
.m-dir.m-long  { color: #7ED99A; }
.m-dir.m-short { color: #FF8B7A; }
.m-dir.m-skip  { color: #C9C0AB; }
.m-conf { color: rgba(241,236,224,0.7); }
.m-note { color: rgba(241,236,224,0.45); font-style: italic; }
.m-aster { color: var(--orange); margin-left: 6px; }

/* ── Section heads ────────────────────────────────────────── */
.sec-head { padding: 48px 0 56px; }

/* ── Problem ──────────────────────────────────────────────── */
.problem-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 60px;
  align-items: start;
}
@media (max-width: 900px) { .problem-grid { grid-template-columns: 1fr; gap: 32px; } }
.problem-h { max-width: 13ch; }
.problem-body { padding-top: 12px; }
.pull-quote {
  margin-top: 80px;
  padding: 60px 0;
  border-top: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  align-items: start;
}
.pq-mark { font-size: 120px; line-height: 0.7; color: var(--orange); }
.pq-text { font-size: clamp(28px, 3.6vw, 52px); line-height: 1.1; letter-spacing: -0.02em; max-width: 22ch; margin: 0; font-style: italic; }
.pq-cite { grid-column: 2; margin-top: 18px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; }

/* ── Dark inverted sections ──────────────────────────────── */
.dark-section {
  background: var(--ink);
  color: var(--paper);
}
.dark-section .rule-dark,
.dark-section .rule { background: rgba(245,239,228,0.22); }
.dark-section .eyebrow-dark { color: rgba(245,239,228,0.55); }
.dark-section .lede-dark { color: rgba(245,239,228,0.92); }
.dark-section .body-dark { color: rgba(245,239,228,0.7); }
.dark-section .h2,
.dark-section .h1 { color: var(--paper); }
.dark-section .pull-quote-dark {
  border-top-color: rgba(245,239,228,0.18);
  border-bottom-color: rgba(245,239,228,0.18);
}
.dark-section .pull-quote-dark .pq-text { color: var(--paper); }
.dark-section .pull-quote-dark .pq-cite { color: rgba(245,239,228,0.5); }
.section-problem { padding-top: 130px; padding-bottom: 130px; position: relative; }
.section-problem .pq-mark { color: var(--orange); }
.section-problem em { color: var(--orange); font-style: italic; }

/* ── Council ──────────────────────────────────────────────── */
.council-grid {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 60px;
  align-items: start;
}
@media (max-width: 1100px) { .council-grid { grid-template-columns: 1fr; } }
.council-copy { padding-top: 12px; position: sticky; top: 100px; }
.council-wrap { display: flex; flex-direction: column; gap: 24px; }
.council-stage { position: relative; }
.council-svg { width: 100%; height: auto; max-width: 720px; margin: 0 auto; display: block; }
.agent-node { transition: transform 0.2s; }
.agent-node:hover { transform: scale(1.05); transform-origin: center; transform-box: fill-box; }

.agent-detail {
  margin-top: 8px;
  min-height: 130px;
  padding: 24px;
  border: 1px solid var(--ink);
  background: var(--paper-2);
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 720px;
  margin-left: auto;
  margin-right: auto;
  width: 100%;
}
.agent-detail.show { opacity: 1; }
.agent-detail .ad-eyebrow { color: var(--ink-3); margin-bottom: 8px; }
.agent-detail .ad-name { margin-bottom: 8px; }
.agent-detail .ad-full { margin-bottom: 16px; max-width: 50ch; }
.agent-detail .ad-meta { display: flex; gap: 32px; flex-wrap: wrap; }
.agent-detail .dim { color: var(--ink-4); margin-right: 6px; }
.agent-detail .ad-hint { padding: 30px 0; text-align: center; }
.dim { color: var(--ink-4); }

.council-legend { display: flex; gap: 24px; justify-content: center; padding-top: 8px; }
.lg-item { display: inline-flex; gap: 8px; align-items: center; }
.lg-dot { width: 10px; height: 10px; display: inline-block; }

/* ── Method (steps) ───────────────────────────────────────── */
.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.step {
  padding: 32px 28px;
  border-right: 1px solid var(--hair);
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 380px;
}
.step:last-child { border-right: 0; }
.step-n { font-size: 12px; color: var(--ink-3); letter-spacing: 0.18em; }
.step-title { font-size: clamp(24px, 2vw, 32px); }
.step-deco { margin-top: auto; height: 100px; }
@media (max-width: 900px) {
  .steps { grid-template-columns: 1fr; }
  .step { border-right: 0; border-bottom: 1px solid var(--hair); min-height: auto; }
  .step:last-child { border-bottom: 0; }
}

/* ── Advantages ───────────────────────────────────────────── */
.adv-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.adv-card {
  padding: 36px 28px;
  border-right: 1px solid var(--hair);
  border-bottom: 1px solid var(--hair);
  min-height: 240px;
}
.adv-card:nth-child(3n) { border-right: 0; }
.adv-card:nth-last-child(-n+3) { border-bottom: 0; }
.adv-n { color: var(--orange); font-size: 32px; line-height: 1; margin-bottom: 18px; font-style: italic; }
.adv-t { font-size: clamp(22px, 2vw, 28px); margin-bottom: 14px; max-width: 18ch; }
@media (max-width: 900px) {
  .adv-grid { grid-template-columns: 1fr; }
  .adv-card { border-right: 0; }
  .adv-card:nth-last-child(-n+3) { border-bottom: 1px solid var(--hair); }
  .adv-card:last-child { border-bottom: 0; }
}

/* ── Stack ────────────────────────────────────────────────── */
.stack-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}
@media (max-width: 900px) { .stack-grid { grid-template-columns: 1fr; } }
.stack-tags { display: flex; flex-wrap: wrap; gap: 10px; }
.stack-tag {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border: 1px solid var(--ink);
  font-size: 12px;
  letter-spacing: 0.04em;
  background: var(--paper);
  transition: all 0.15s;
  font-family: var(--mono);
}
.stack-tag:hover { background: var(--ink); color: var(--paper); }
.stack-tag-n { color: var(--orange); font-weight: 600; }
.stack-tag:hover .stack-tag-n { color: var(--orange); }

/* ── Dashboard ────────────────────────────────────────────── */
.dashboard {
  border: 1px solid var(--ink);
  background: #FBF7EB;
  overflow: hidden;
}
.dash-chrome {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--ink);
  background: var(--paper-2);
  gap: 16px;
}
.dc-left { display: flex; align-items: center; gap: 8px; font-size: 12px; flex-shrink: 0; }
.dc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }
.dc-dot-r { background: #E04E1B; }
.dc-dot-y { background: #D9B23A; }
.dc-dot-g { background: #2F6B3B; }
.dc-title { margin-left: 10px; color: var(--ink-3); }
.dc-right { color: var(--green); white-space: nowrap; font-size: 11px; flex-shrink: 0; }

.dash-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  grid-template-rows: auto auto;
  gap: 0;
}
.dash-chart-cell { grid-column: 1; grid-row: 1; padding: 24px; border-right: 1px solid var(--hair); border-bottom: 1px solid var(--hair); }
.dash-verdict-cell { grid-column: 2; grid-row: 1; padding: 24px; border-bottom: 1px solid var(--hair); display: flex; flex-direction: column; gap: 14px; }
.dash-votes-cell { grid-column: 1; grid-row: 2; padding: 24px; border-right: 1px solid var(--hair); }
.dash-log-cell { grid-column: 2; grid-row: 2; padding: 24px; }

@media (max-width: 900px) {
  .dash-grid { grid-template-columns: 1fr; }
  .dash-chart-cell, .dash-verdict-cell, .dash-votes-cell, .dash-log-cell {
    grid-column: 1; grid-row: auto; border-right: 0; border-bottom: 1px solid var(--hair);
  }
}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className="twk-seg">
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakToggle, TweakRadio, TweakSelect,
});

// ============================================================
// CONCLAVE — Hooks: language, reveal-on-scroll, live verdicts
// ============================================================

const { useState, useEffect, useRef, useMemo, useCallback } = React;

// Bilingual context (simplified — global state via window)
window.useLang = function () {
  const [lang, setLangState] = useState(() => window.__lang || 'ru');
  useEffect(() => {
    const onChange = (e) => setLangState(e.detail);
    window.addEventListener('langchange', onChange);
    return () => window.removeEventListener('langchange', onChange);
  }, []);
  const setLang = useCallback((l) => {
    window.__lang = l;
    window.dispatchEvent(new CustomEvent('langchange', { detail: l }));
  }, []);
  const t = useCallback((key) => (window.COPY[lang] && window.COPY[lang][key]) || key, [lang]);
  const tr = useCallback((obj) => (obj && obj[lang]) || (obj && obj.en) || '', [lang]);
  return { lang, setLang, t, tr };
};

// Reveal on scroll
window.useReveal = function () {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      }),
      { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
};

// Live verdicts — agents shuffle their votes every few seconds
window.useLiveCouncil = function (seed = 0) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick((x) => x + 1), 2400);
    return () => clearInterval(id);
  }, []);

  return useMemo(() => {
    const r = (i) => {
      const x = Math.sin((tick + 1) * 9.7 + i * 12.3 + seed) * 10000;
      return x - Math.floor(x);
    };
    const votes = window.AGENTS.map((a, i) => {
      const v = r(i);
      const dir = v < 0.55 ? 'LONG' : v < 0.78 ? 'SHORT' : 'SKIP';
      const conf = Math.round(40 + r(i + 30) * 55);
      return { id: a.id, dir, conf, weight: a.weight };
    });
    let long = 0, short = 0, skip = 0;
    votes.forEach((v) => {
      const w = v.weight * (v.conf / 100);
      if (v.dir === 'LONG') long += w;
      else if (v.dir === 'SHORT') short += w;
      else skip += w;
    });
    const total = long + short + skip || 1;
    const longPct = long / total;
    const shortPct = short / total;
    const skipPct = skip / total;
    let verdict = 'SKIP';
    let conf = Math.round(skipPct * 100);
    if (longPct > 0.5 && longPct > shortPct + 0.12) { verdict = 'LONG'; conf = Math.round(longPct * 100); }
    else if (shortPct > 0.5 && shortPct > longPct + 0.12) { verdict = 'SHORT'; conf = Math.round(shortPct * 100); }
    else { verdict = 'SKIP'; conf = Math.round(Math.max(longPct, shortPct, skipPct) * 100); }
    return { tick, votes, verdict, conf, longPct, shortPct, skipPct };
  }, [tick, seed]);
};

// Animated number counter — runs immediately if already in viewport
window.useCount = function (target, duration = 1400, start = 0) {
  const [value, setValue] = useState(start);
  const ref = useRef(null);
  const ranRef = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el || ranRef.current) return;
    const run = () => {
      if (ranRef.current) return;
      ranRef.current = true;
      const t0 = performance.now();
      const tick = (now) => {
        const p = Math.min(1, (now - t0) / duration);
        const eased = 1 - Math.pow(1 - p, 3);
        setValue(start + (target - start) * eased);
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    };
    // Already visible? run immediately.
    const r = el.getBoundingClientRect();
    const inView = r.top < window.innerHeight && r.bottom > 0;
    if (inView) { run(); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { run(); io.disconnect(); } });
    }, { threshold: 0.2 });
    io.observe(el);
    return () => io.disconnect();
  }, [target, duration, start]);
  return [value, ref];
};

// ── Hero animated background (canvas — neural net particles) ─
function HeroBackground({ style }) {
  const ref = useRefA(null);
  useEffectA(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let nodes = [];

    const resize = () => {
      const r = canvas.getBoundingClientRect();
      canvas.width = r.width * dpr;
      canvas.height = r.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const count = Math.max(80, Math.round((r.width * r.height) / 8000));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * r.width,
        y: Math.random() * r.height,
        vx: (Math.random() - 0.5) * 0.22,
        vy: (Math.random() - 0.5) * 0.22,
        r: Math.random() * 1.8 + 0.8,
      }));
    };
    resize();
    window.addEventListener('resize', resize);

    const cs = getComputedStyle(document.documentElement);
    const ink = cs.getPropertyValue('--ink').trim() || '#14130F';
    const orange = cs.getPropertyValue('--orange').trim() || '#E04E1B';

    const tick = () => {
      const r = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, r.width, r.height);

      const linkDist = 140;
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        a.x += a.vx; a.y += a.vy;
        if (a.x < 0 || a.x > r.width) a.vx *= -1;
        if (a.y < 0 || a.y > r.height) a.vy *= -1;
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < linkDist) {
            const op = (1 - d / linkDist) * 0.36;
            ctx.strokeStyle = `rgba(20,19,15,${op})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      nodes.forEach((n, i) => {
        ctx.fillStyle = i % 9 === 0 ? orange : ink;
        ctx.globalAlpha = i % 9 === 0 ? 0.75 : 0.6;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, [style]);

  if (style === 'grid') {
    return <div className="hero-bg hero-bg-grid" />;
  }
  if (style === 'orbits') {
    return (
      <svg className="hero-bg hero-bg-orbits" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice">

          <circle cx="780" cy="340" r="200"/>
          <circle cx="780" cy="340" r="280"/>
          <circle cx="780" cy="340" r="360"/>

          <circle cx="900" cy="340" r="2.4"/>
          <circle cx="588" cy="240" r="2.2"/>
          <circle cx="608" cy="430" r="2"/>
        </g>
        <circle cx="780" cy="340" r="6" fill="var(--orange)"/>
      </svg>
    );
  }
  return <canvas ref={ref} className="hero-bg" />;
}

const { useState: useStateD, useEffect: useEffectD, useRef: useRefD, useMemo: useMemoD } = React;

function usePriceSeries(n = 120, base = 67400, vol = 120) {
  const [data, setData] = useStateD(() => {
    let p = base;
    const arr = [];
    for (let i = 0; i < n; i++) {
      p += (Math.random() - 0.5) * vol;
      arr.push(p);
    }
    return arr;
  });
  useEffectD(() => {
    const id = setInterval(() => {
      setData((prev) => {
        const last = prev[prev.length - 1];
        const next = last + (Math.random() - 0.48) * vol;
        return [...prev.slice(1), next];
      });
    }, 800);
    return () => clearInterval(id);
  }, [vol]);
  return data;
}

function PriceChart({ data, decision }) {
  const w = 760, h = 280, pad = 12;
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const scaleX = (i) => pad + (i / (data.length - 1)) * (w - pad * 2);
  const scaleY = (v) => pad + (1 - (v - min) / span) * (h - pad * 2);
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${scaleX(i).toFixed(1)} ${scaleY(v).toFixed(1)}`).join(' ');
  const fillPath = `${path} L ${scaleX(data.length - 1).toFixed(1)} ${h - pad} L ${pad} ${h - pad} Z`;
  const last = data[data.length - 1];
  const first = data[0];
  const change = last - first;
  const changePct = (change / first) * 100;

  const color = decision === 'LONG' ? 'var(--green)' : decision === 'SHORT' ? 'var(--red)' : 'var(--ink)';

  return (
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" preserveAspectRatio="none" className="chart-svg">
        <defs>
          <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0.25, 0.5, 0.75].map((p, i) => (
          <line key={i} x1={pad} y1={pad + p * (h - pad * 2)} x2={w - pad} y2={pad + p * (h - pad * 2)} stroke="var(--hair)" strokeWidth="0.6" strokeDasharray="2 4"/>
        ))}
        <path d={fillPath} fill="url(#chart-fill)"/>
        <path d={path} fill="none" stroke={color} strokeWidth="1.2"/>
        {/* last dot */}
        <circle cx={scaleX(data.length - 1)} cy={scaleY(last)} r="3" fill={color}/>
        <circle cx={scaleX(data.length - 1)} cy={scaleY(last)} r="6" fill="none" stroke={color} strokeOpacity="0.4">
          <animate attributeName="r" values="3;10;3" dur="1.6s" repeatCount="indefinite"/>
          <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="1.6s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div className="chart-meta">
        <div className="cm-pair mono">BTC / USDT</div>
        <div className="cm-price serif">${last.toFixed(0)}</div>
        <div className={`cm-chg mono ${change >= 0 ? 'pos' : 'neg'}`}>
          {change >= 0 ? '+' : ''}{change.toFixed(0)} · {changePct >= 0 ? '+' : ''}{changePct.toFixed(2)}%
        </div>
      </div>
    </div>
  );
}

function VoteBars({ live }) {
  const { tr } = window.useLang();
  return (
    <div className="vote-bars">
      {window.AGENTS.map((a, i) => {
        const v = live.votes[i];

            <span className="vr-bar"><span className="vr-fill" style={{ width: `${v.conf}%` }}></span></span>
            <span className="vr-dir mono">{v.dir}</span>
            <span className="vr-conf mono">{v.conf}%</span>
          </div>
        );
      })}
    </div>
  );
}

  const baseLog = useMemoD(() => ([

    { time: '13:22:09', pair: 'SOL/USDT',  dir: 'SHORT', conf: 71, pnl: '+0.96%' },

    { time: '12:11:50', pair: 'ARB/USDT',  dir: 'LONG',  conf: 62, pnl: '−0.34%' },
    { time: '11:39:05', pair: 'DOGE/USDT', dir: 'SHORT', conf: 58, pnl: '+0.52%' },
  ]), []);
  return (
    <div className="trade-log">
      <div className="tl-head mono small">
        <span>TIME</span><span>PAIR</span><span>DIR</span><span>CONF</span><span>P&L</span>
      </div>
      {baseLog.map((r, i) => (
        <div key={i} className={`tl-row mono dir-${r.dir.toLowerCase()}`}>
          <span>{r.time}</span>
          <span>{r.pair}</span>
          <span>{r.dir}</span>
          <span>{r.conf}%</span>
          <span>{r.pnl}</span>
        </div>
      ))}
    </div>
  );
}

function DashboardSection() {
  const { t } = window.useLang();
  const live = window.useLiveCouncil(3);
  const data = usePriceSeries();

  return (
    <section id="dashboard" className="section section-dash">
      <div className="page">
        <div className="rule"></div>
        <div className="sec-head">
          <div className="eyebrow">{t('dash_eyebrow')}</div>
          <h2 className="h2" style={{ marginTop: 12 }}>{t('dash_h')}</h2>
          <p className="lede" style={{ marginTop: 16, maxWidth: 620 }}>{t('dash_lede')}</p>
        </div>

        <div className="dashboard">
          <div className="dash-chrome">
            <div className="dc-left mono">
              <span className="dc-dot dc-dot-r"></span>
              <span className="dc-dot dc-dot-y"></span>
              <span className="dc-dot dc-dot-g"></span>
              <span className="dc-title">conclave / terminal · v0.4.2</span>
            </div>
            <div className="dc-right mono small">● LIVE · paper-trading mode</div>
          </div>

          <div className="dash-grid">
            <div className="dash-chart-cell">
              <PriceChart data={data} decision={live.verdict}/>
            </div>

            <div className="dash-verdict-cell">
              <div className="dv-eyebrow mono small">{t('verdict')}</div>
              <div className={`dv-decision serif dv-${live.verdict.toLowerCase()}`}>{live.verdict}</div>
              <div className="dv-conf">
                <div className="dv-conf-bar"><div className="dv-conf-fill" style={{ width: `${live.conf}%`, background: live.verdict === 'LONG' ? 'var(--green)' : live.verdict === 'SHORT' ? 'var(--red)' : 'var(--ink-3)' }}></div></div>
                <div className="dv-conf-label mono small">{live.conf}% {t('confidence')}</div>
              </div>
              <div className="dv-split">
                <div><span className="mono dim small">L</span> <span className="mono">{Math.round(live.longPct * 100)}%</span></div>
                <div><span className="mono dim small">S</span> <span className="mono">{Math.round(live.shortPct * 100)}%</span></div>
                <div><span className="mono dim small">∅</span> <span className="mono">{Math.round(live.skipPct * 100)}%</span></div>
              </div>
            </div>

            <div className="dash-votes-cell">
              <div className="dv-eyebrow mono small">COUNCIL VOTES</div>
              <VoteBars live={live} />
            </div>

            <div className="dash-log-cell">
              <div className="dv-eyebrow mono small">RECENT DECISIONS</div>
              <TradeLog />
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}
